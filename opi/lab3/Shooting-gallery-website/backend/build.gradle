task report {
    group = 'verification'
    description = 'Добавляет JUnit XML отчет в git и коммитит его после успешных тестов'

    dependsOn test

    doLast {
        if (test.state.failure != null) {
            println "Тесты не прошли, отчет не будет закоммичен."
            return
        }

        def reportDir = file("${buildDir}/test-results/test")
        if (!reportDir.exists()) {
            println "Отчеты JUnit не найдены в ${reportDir}"
            return
        }

        def xmlFiles = fileTree(reportDir) {
            include '**/*.xml'
        }.files

        if (xmlFiles.isEmpty()) {
            println "Не найдено xml-файлов для добавления."
            return
        }

// Добавляем файлы в git по отдельности
        xmlFiles.each { file ->
            // Вычисляем путь относительно корня проекта (rootDir)
            def relativePath = file.absolutePath - project.rootDir.absolutePath
            if (relativePath.startsWith(File.separator)) {
                relativePath = relativePath.substring(1)
            }

            exec {
                commandLine 'git', 'add', relativePath
            }
        }
        // Коммитим изменения
        def commitMessage = "Add JUnit test report - ${new Date().format('yyyy-MM-dd HH:mm:ss')}"
        def commitResult = exec {
            commandLine 'git', 'commit', '-m', commitMessage
            ignoreExitValue true // чтобы не падать если нет изменений для коммита
        }

        println "Отчеты JUnit добавлены и коммичены (если были изменения)."
    }
}

task diff {
    doLast {
        def stdout = new ByteArrayOutputStream()
        exec {
            workingDir = project.rootDir
            commandLine 'git', 'status', '-s'
            standardOutput = stdout
        }

        def statusLines = stdout.toString().readLines()
                .findAll { it.trim() }

        if (statusLines.isEmpty()) {
            println "Нет изменений для коммита."
            return
        }

        println "Файлы для коммита:"
        statusLines.each { println " - $it" }

        // Добавим все изменения включая новые файлы
        exec {
            workingDir = project.rootDir
            commandLine 'git', 'add', '-A'
        }

        // Коммитим
        exec {
            workingDir = project.rootDir
            commandLine 'git', 'commit', '-m', "Автоматический коммит изменений"
        }
    }
}






