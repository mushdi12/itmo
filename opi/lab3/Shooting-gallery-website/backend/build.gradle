    inputs.file 'src/main/resources/messages_ru.properties'
    outputs.file 'build/resources/main/messages_ru_ascii.properties'

    commandLine 'native2ascii', 'src/main/resources/messages_ru.properties', 'build/resources/main/messages_ru_ascii.properties'
}

// Функция для вычисления хэша файла
def hashFile(File file, String algorithm) {
    MessageDigest digest = MessageDigest.getInstance(algorithm)
    file.withInputStream { is ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = is.read(buffer)) != -1) {
            digest.update(buffer, 0, read)
        }
    }
    return digest.digest().encodeHex().toString()
}

task doc(type: Jar) {
    dependsOn javadoc, war
    archiveClassifier = 'doc'  // lab4-1.0-SNAPSHOT-doc.jar

    from javadoc.destinationDir

    doFirst {
        def warFile = war.archiveFile.get().asFile
        def md5 = hashFile(warFile, "MD5")
        def sha1 = hashFile(warFile, "SHA-1")

        manifest {
            attributes(
                    "Implementation-Title": project.name,
                    "Implementation-Version": project.version,
                    "MD5-Checksum": md5,
                    "SHA1-Checksum": sha1
            )
        }
    }
}

